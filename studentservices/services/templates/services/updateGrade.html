<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Update Grade</title>
	</head>
	<body>
		<h2>Update Grade</h2>
			<p style="color: red;">{{error}}</p>

		<form method="post">
			{%csrf_token%}
			<p for="user">User: {{grade.user.username}}</p>

			<label for="subject">Subject:</label>
			<input type="text" id="subject" name="subject" value="{{grade.subject}}">

			<br><br>

			<label for="grade">Grade:</label>
			<input type="text" id="grade" name="grade" maxlength="1" value="{{grade.grade}}">

			<br><br>

			<label for="percentage">Percentage:</label>
			<input type="number" id="percentage" name="percentage" min="0" max="100" value="{{grade.percentage}}">

			<br><br>

			<button type="submit">Update Grade</button>
		</form>
	</body>
</html>
