<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<title>Add New Fee</title>
	</head>
	<body>
		<h2>Add New Fee</h2>
			<p style="color: red;">{{error}}</p>

		<form method="post">
			{%csrf_token%}
			<label for="user">User:</label>
			<select name="user" id="user">
				{%for student in students%}
					<option value="{{student.username}}">{{student.username}}</option>
				{%endfor%}
			</select>

			<br><br>

			<label for="name">Name:</label>
			<input type="text" id="name" name="name" value="{{fee.name}}">

			<br><br>

			<label for="amount"">Amount:</label>
			<input type="number" id="amount" name="amount" min="0" max="100000" value="{{fee.amount}}" step="0.01">

			<br><br>

			<label for="status">Status:</label>
			<select name="status">
				<option value="Unpaid">Unpaid</option>
				<option value="Paid">Paid</option>
			</select>

			<br><br>

			<button type="submit">Create Fee</button>
		</form>
	</body>
</html>
